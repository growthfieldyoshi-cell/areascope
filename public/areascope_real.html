<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREASCOPE — 本物データ版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
    --border:#1e2d45;--accent:#00d4aa;--accent2:#ff6b35;
    --accent3:#4f8ef7;--text:#e8edf5;--text-muted:#6b7a99;
    --positive:#00d4aa;--negative:#ff4757;--warning:#ffa502;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;}
  header{padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
  .logo span{color:var(--accent);}
  .badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;}
  .badge.live{color:var(--accent);border-color:var(--accent);}
  .search-section{padding:32px 32px 20px;max-width:1400px;margin:0 auto;}
  .search-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .search-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;cursor:pointer;min-width:200px;}
  select:focus{border-color:var(--accent);}
  .search-btn{background:var(--accent);color:#0a0e1a;border:none;border-radius:8px;padding:12px 24px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
  .search-btn:hover{opacity:0.85;}
  .search-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .cors-notice{margin-top:12px;padding:12px 16px;background:rgba(255,165,2,0.08);border:1px solid rgba(255,165,2,0.3);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--warning);line-height:1.7;}
  .cors-notice strong{color:#fff;}
  .cors-step{margin-top:6px;padding-left:12px;}
  .main{max-width:1400px;margin:0 auto;padding:0 32px 60px;}
  .loading{text-align:center;padding:80px 20px;font-family:'DM Mono',monospace;color:var(--text-muted);}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:8px;padding:20px 24px;margin:20px 0;font-family:'DM Mono',monospace;font-size:13px;color:var(--negative);}
  .area-titlebar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .area-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:600;}
  .area-name span{color:var(--accent);}
  .area-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-top:6px;}
  /* KPIグリッド: PC=4列, SP=2列 */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kpi-card.green::before{background:var(--positive);}
  .kpi-card.blue::before{background:var(--accent3);}
  .kpi-card.orange::before{background:var(--accent2);}
  .kpi-card.yellow::before{background:var(--warning);}
  .kpi-label{font-size:11px;color:var(--text-muted);margin-bottom:10px;font-family:'DM Mono',monospace;line-height:1.4;}
  .kpi-value{font-family:'Syne',sans-serif;font-size:clamp(20px,3vw,30px);font-weight:600;line-height:1;margin-bottom:6px;}
  .kpi-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);line-height:1.5;}
  .up{color:var(--positive);}
  .down{color:var(--negative);}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px;}
  .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .chart-title{font-size:13px;font-weight:500;}
  .chart-title small{display:block;font-size:11px;color:var(--text-muted);font-weight:400;margin-top:2px;font-family:'DM Mono',monospace;}
  .chart-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--accent);color:var(--accent);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .data-note{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:20px;flex-wrap:wrap;}
  .note-item{display:flex;align-items:center;gap:6px;}
  .note-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp 0.4s ease forwards;}
  /* ===== レスポンシブ ===== */
  @media(max-width:768px){
    header{padding:14px 16px;}
    .logo{font-size:17px;}
    .badge{font-size:10px;padding:3px 8px;}
    .search-section{padding:20px 16px 16px;}
    .main{padding:0 16px 40px;}
    .search-row{flex-direction:column;align-items:stretch;}
    select{min-width:unset;width:100%;}
    .search-btn{width:100%;padding:14px;font-size:15px;}
    .cors-notice{font-size:10px;}
    /* KPI: 2列 */
    .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
    .kpi-value{font-size:clamp(20px,5.5vw,28px);}
    /* タイトルバー縦並び */
    .area-titlebar{flex-direction:column;align-items:flex-start;gap:6px;}
    .area-name{font-size:22px;}
    .area-titlebar > div:last-child{text-align:left !important;}
    .area-titlebar > div:last-child > div:first-child{text-align:left;}
    /* チャート2列→1列 */
    .two-col{grid-template-columns:1fr;}
    .chart-card{padding:16px;}
  }
</style>
</head>

let charts = [];
function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

async function analyzeArea() {
  const cityCode = document.getElementById('citySelect').value;
  if (!cityCode) { alert('市区町村を選択してください'); return; }
  const cityName = document.getElementById('citySelect').selectedOptions[0].text;
  const prefName = document.getElementById('prefSelect').selectedOptions[0].text;

  destroyCharts();
  const dash = document.getElementById('dashboard');
  dash.innerHTML = `<div class="loading"><div class="spinner"></div>e-Stat API からリアルデータを取得中...<br><small style="font-size:10px;margin-top:8px;display:block;">エリアコード: ${cityCode}</small></div>`;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '取得中...';

  try {
    const PROXY = "https://corsproxy.io/?url=";
    
    // 国勢調査「都道府県・市区町村別の主な結果」を年ごとに並列取得
    // 各年の統計表IDと対応年
    const censusTables = [
      { year: 2020, id: '0003445078' },  // ✅ 確認済み
      { year: 2015, id: '0003412420' },
      { year: 2010, id: '0003412419' },
      { year: 2005, id: '0003412418' },
      { year: 2000, id: '0003412417' },
      { year: 1995, id: '0003412416' },
    ];

    // 国勢調査データを並列取得
    const censusResults = await Promise.allSettled(
      censusTables.map(async ({ year, id }) => {
        const apiUrl = `https://api.e-stat.go.jp/rest/3.0/app/json/getStatsData?appId=${API_KEY}&lang=J&statsDataId=${id}&cdArea=${cityCode}&metaGetFlg=N&cntGetFlg=N&limit=10`;
        const url = `${PROXY}${encodeURIComponent(apiUrl)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const status = data.GET_STATS_DATA?.RESULT?.STATUS;
        if (status !== 0) throw new Error('no data');
        const values = data.GET_STATS_DATA?.STATISTICAL_DATA?.DATA_INF?.VALUE;
        if (!values) throw new Error('no values');
        const arr = Array.isArray(values) ? values : [values];
        let pop = 0;
        for (const v of arr) {
          const cat = v['@cat01'] || '';
          if (cat === '0' || cat === '00' || cat === '000') {
            pop = parseInt((v['$'] || '').replace(/[^0-9]/g, ''));
            break;
          }
        }
        if (!pop) {
          for (const v of arr) {
            const n = parseInt((v['$'] || '').replace(/[^0-9]/g, ''));
            if (!isNaN(n) && n > pop) pop = n;
          }
        }
        if (!pop || pop <= 1000) throw new Error('invalid pop: ' + pop);
        return { year, pop };
      })
    );

    // 住民基本台帳（最新年）を取得
    let latestPop = null;
    try {
      const ltUrl = `https://api.e-stat.go.jp/rest/3.0/app/json/getStatsData?appId=${API_KEY}&lang=J&statsDataId=${latestTable.id}&cdArea=${cityCode}&cdCat01=${latestTable.cat}&metaGetFlg=N&cntGetFlg=N&limit=5`;
      const ltRes = await fetch(`${PROXY}${encodeURIComponent(ltUrl)}`);
      const ltData = await ltRes.json();
      const ltValues = ltData.GET_STATS_DATA?.STATISTICAL_DATA?.DATA_INF?.VALUE;
      if (ltValues) {
        const ltArr = Array.isArray(ltValues) ? ltValues : [ltValues];
        // 最新年のデータ（@timeが最大）
        const sorted = ltArr
          .filter(v => v['$'] && parseInt(v['$']) > 1000)
          .sort((a,b) => (b['@time']||'').localeCompare(a['@time']||''));
        if (sorted[0]) {
          const yr = parseInt((sorted[0]['@time']||'').substring(0,4));
          const pop = parseInt(sorted[0]['$'].replace(/[^0-9]/g,''));
          if (yr >= 2021 && pop > 0) latestPop = { year: yr, pop, source: '住民基本台帳' };
        }
      }
    } catch(e) { /* 住基台帳は任意 */ }

    const popData = [
      ...censusResults.filter(r => r.status === 'fulfilled').map(r => r.value),
      ...(latestPop ? [latestPop] : [])
    ].sort((a, b) => a.year - b.year);

    if (popData.length === 0) {
      throw new Error('人口データを取得できませんでした。しばらく時間をおいて再試行してください。');
    }

    renderDashboard(cityName, prefName, cityCode, popData);
  } catch(e) {
    let hint = '';
    if (e.message.includes('fetch') || e.message.includes('CORS')) {
      hint = '<br><br>💡 <strong>CORSエラーです。</strong>Chrome拡張「Allow CORS: Access-Control-Allow-Origin」をインストールしてONにすると解決します。';
    }
    dash.innerHTML = `<div class="error-box">⚠ データ取得エラー: ${e.message}${hint}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '分析する →';
  }
}

function parsePopulation(data) {
  try {
    const statData = data.GET_STATS_DATA.STATISTICAL_DATA;
    const values = statData.DATA_INF.VALUE;
    const arr = Array.isArray(values) ? values : [values];
    const result = [];
    arr.forEach(v => {
      const timeStr = v['@time'] || '';
      const year = parseInt(timeStr.substring(0,4));
      const pop = parseInt((v['$']||'').replace(/[^0-9]/g,''));
      if (!isNaN(pop) && pop > 0 && year >= 1980) result.push({year, pop});
    });
    return result.sort((a,b)=>a.year-b.year);
  } catch(e) { console.error('parse error:', e); return []; }
}

function renderDashboard(cityName, prefName, cityCode, popData) {
  if (!popData || popData.length === 0) return;
  const latest = popData[popData.length-1];
  const prev = popData.length >= 2 ? popData[popData.length-2] : null;
  const oldest = popData[0];
  const peak = popData.reduce((a,b)=>a.pop>b.pop?a:b);
  const change = prev ? ((latest.pop-prev.pop)/prev.pop*100).toFixed(1) : 'N/A';
  const totalChange = ((latest.pop-oldest.pop)/oldest.pop*100).toFixed(1);
  const chgClass = change === 'N/A' ? '' : (parseFloat(change)>=0?'up':'down');
  const chgArrow = change === 'N/A' ? '' : (parseFloat(change)>=0?'▲':'▼');

  document.getElementById('dashboard').innerHTML = `
    <div class="area-titlebar fade-up">
      <div>
        <div class="area-name">${prefName} <span>${cityName}</span></div>
        <div class="area-meta">// 市区町村コード: ${cityCode} &nbsp;|&nbsp; 出典: 総務省統計局 国勢調査（e-Stat API）</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;">最新調査年</div>
        <div style="font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--accent);line-height:1;">${latest.year}</div>
      </div>
    </div>
    <div class="kpi-grid fade-up">
      <div class="kpi-card green">
        <div class="kpi-label">最新人口（${latest.year}年）</div>
        <div class="kpi-value">${latest.pop.toLocaleString()}</div>
        <div class="kpi-sub">人</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">前回比（${prev ? prev.year : "-"}→${latest.year}）</div>
        <div class="kpi-value ${chgClass}">${change === 'N/A' ? 'データ不足' : chgArrow + Math.abs(parseFloat(change)) + '%'}</div>
        <div class="kpi-sub">${prev ? (latest.pop-prev.pop).toLocaleString() : "-"}人の変化</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">人口ピーク年</div>
        <div class="kpi-value">${peak.year}年</div>
        <div class="kpi-sub">${peak.pop.toLocaleString()}人（最大値）</div>
      </div>
      <div class="kpi-card yellow">
        <div class="kpi-label">長期変化（${oldest.year}年比）</div>
        <div class="kpi-value ${parseFloat(totalChange)>=0?'up':'down'}">${parseFloat(totalChange)>=0?'▲':'▼'}${Math.abs(totalChange)}%</div>
        <div class="kpi-sub">${oldest.year}年: ${oldest.pop.toLocaleString()}人</div>
      </div>
    </div>
    <div class="chart-card fade-up">
      <div class="chart-header">
        <div class="chart-title">人口推移グラフ（実データ）<small>出典: 総務省統計局 国勢調査 / e-Stat API リアルタイム取得</small></div>
        <div class="chart-badge">REAL DATA</div>
      </div>
      <canvas id="popChart" height="90"></canvas>
    </div>
    <div class="two-col fade-up">
      <div class="chart-card">
        <div class="chart-header"><div class="chart-title">調査年別人口<small>棒グラフ（最新年を強調）</small></div></div>
        <canvas id="barChart" height="180"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header"><div class="chart-title">5年ごとの増減率<small>前回調査との比較（%）</small></div></div>
        <canvas id="growthChart" height="180"></canvas>
      </div>
    </div>
    <div class="data-note">
      <div class="note-item"><div class="note-dot"></div>e-Stat API（総務省）— 本物データ</div>
      <div class="note-item"><div class="note-dot" style="background:var(--accent3)"></div>国勢調査（5年ごと更新）</div>
      <div style="margin-left:auto;">取得日時: ${new Date().toLocaleString('ja-JP')}</div>
    </div>
    <div style="margin-top:12px;padding:12px 16px;background:rgba(0,212,170,0.07);border:1px solid rgba(0,212,170,0.25);border-radius:8px;font-size:11px;color:var(--text-muted);line-height:1.7;">
      📋 <strong style="color:var(--accent);">令和7年（2025年）国勢調査について</strong><br>
      2025年10月1日に調査が実施済みです。集計結果は <strong style="color:#e2e8f0;">2026年5月に人口速報</strong>、<strong style="color:#e2e8f0;">2026年9月に基本集計</strong> が総務省統計局より公表予定です。
      公表次第、本サービスのデータも更新されます。
    </div>`;

  const C = Chart.defaults;
  C.color='#6b7a99'; C.font.family="'DM Mono',monospace"; C.font.size=11;

  const c1 = new Chart(document.getElementById('popChart').getContext('2d'),{
    type:'line',
    data:{
      labels:popData.map(d=>d.year+'年'),
      datasets:[{label:'人口',data:popData.map(d=>d.pop),borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,0.08)',fill:true,tension:0.4,pointRadius:5,pointBackgroundColor:'#00d4aa',pointBorderColor:'#0a0e1a',pointBorderWidth:2}]
    },
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`人口: ${c.raw.toLocaleString()}人`}}},scales:{x:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99'}},y:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',callback:v=>(v/10000).toFixed(0)+'万人'}}}}
  });

  const c2 = new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{
      labels:popData.map(d=>d.year+'年'),
      datasets:[{label:'人口',data:popData.map(d=>d.pop),backgroundColor:popData.map((_,i)=>i===popData.length-1?'rgba(0,212,170,0.8)':'rgba(79,142,247,0.5)'),borderRadius:4}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',maxRotation:45}},y:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',callback:v=>(v/10000).toFixed(0)+'万'}}}}
  });

  const growthData = popData.slice(1).map((d,i)=>({year:d.year,rate:((d.pop-popData[i].pop)/popData[i].pop*100).toFixed(2)}));
  const c3 = new Chart(document.getElementById('growthChart').getContext('2d'),{
    type:'bar',

      labels:growthData.map(d=>d.year+'年'),

    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',maxRotation:45}},y:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',callback:v=>v+'%'}}}}
  });

  charts = [c1,c2,c3];
}
