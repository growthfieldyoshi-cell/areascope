<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREASCOPE — 駅別乗降客数推移</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;--accent:#00d4aa;--accent3:#4f8ef7;--text:#e8edf5;--text-muted:#6b7a99;--negative:#ff4757;--warning:#ffa502;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;}
header{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;text-decoration:none;color:var(--text);}
.logo span{color:var(--accent);}
.nav-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;text-decoration:none;cursor:pointer;transition:all 0.2s;}
.nav-badge:hover{border-color:var(--accent);color:var(--accent);}
.nav-badge.active{color:var(--accent3);border-color:var(--accent3);}

.search-section{padding:24px 32px 16px;max-width:1400px;margin:0 auto;}
.search-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.search-box-wrap{position:relative;margin-bottom:14px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px 14px 46px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent3);}
.search-input::placeholder{color:var(--text-muted);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:18px;pointer-events:none;}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;max-height:320px;overflow-y:auto;z-index:200;display:none;}
.autocomplete-list.show{display:block;}

/* サジェストのグループ（駅名合算 + 路線別） */
.ac-group-header{padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;background:var(--bg);border-bottom:1px solid var(--border);}
.autocomplete-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);transition:background 0.15s;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover,.autocomplete-item.selected{background:rgba(79,142,247,0.1);}
.autocomplete-item.merged{background:rgba(0,212,170,0.04);}
.autocomplete-item.merged:hover{background:rgba(0,212,170,0.1);}
.ac-left{display:flex;align-items:center;gap:10px;}
.ac-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.ac-badge.all{background:rgba(0,212,170,0.15);color:var(--accent);border:1px solid rgba(0,212,170,0.3);}
.ac-badge.line{background:rgba(79,142,247,0.1);color:var(--accent3);border:1px solid rgba(79,142,247,0.2);}
.ac-station{font-weight:500;font-size:14px;}
.ac-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-align:right;}

.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.filter-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;margin-bottom:10px;}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;}
select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;cursor:pointer;flex:1;min-width:140px;}
select:focus{border-color:var(--accent3);}
.search-btn{background:var(--accent3);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;}
.search-btn:hover{opacity:0.85;}

.result-section{padding:0 32px 48px;max-width:1400px;margin:0 auto;}

/* 駅タイトル */
.station-titlebar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.station-name{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1.1;}
.station-name .pref-tag{color:var(--accent3);font-size:20px;margin-right:8px;}
.station-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.7;}

/* 路線内訳タグ */
.line-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.line-tag{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.line-tag:hover{border-color:var(--accent3);color:var(--accent3);}
.line-tag.active-tag{border-color:var(--accent);color:var(--accent);}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.k-latest::before{background:var(--warning);}
.kpi-card.k-peak::before{background:var(--accent);}
.kpi-card.k-covid::before{background:var(--negative);}
.kpi-card.k-rec::before{background:var(--accent3);}
.kpi-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px;}
.kpi-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
.kpi-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;padding:2px 7px;border-radius:4px;margin-top:6px;}
.kpi-badge.up{background:rgba(0,212,170,0.15);color:var(--accent);}
.kpi-badge.down{background:rgba(255,71,87,0.15);color:var(--negative);}
.kpi-badge.neutral{background:rgba(79,142,247,0.15);color:var(--accent3);}

.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.chart-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent3);letter-spacing:1px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.chart-title small{font-size:10px;color:var(--text-muted);}
.chart-wrap{position:relative;height:210px;}

/* 路線内訳テーブル */
.lines-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.breakdown-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent3);letter-spacing:1px;margin-bottom:14px;}
.breakdown-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:all 0.15s;}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-row:hover{background:rgba(79,142,247,0.06);padding-left:8px;}
.br-line{flex:1;}
.br-line-name{font-size:13px;font-weight:500;}
.br-company{font-size:11px;color:var(--text-muted);}
.br-bar-wrap{width:140px;height:6px;background:var(--surface2);border-radius:3px;flex-shrink:0;}
.br-bar{height:100%;border-radius:3px;}
.br-val{font-family:'DM Mono',monospace;font-size:12px;width:80px;text-align:right;flex-shrink:0;}
.br-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:40px;text-align:right;flex-shrink:0;}

.covid-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.impact-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.impact-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:58px;text-align:right;flex-shrink:0;}
.impact-bar-wrap{flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.impact-bar{height:100%;border-radius:4px;transition:width 0.8s ease;}
.impact-val{font-family:'DM Mono',monospace;font-size:11px;width:100px;text-align:right;flex-shrink:0;}

.ranking-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.ranking-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent3);letter-spacing:1px;margin-bottom:12px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.15s;border-radius:6px;}
.rank-item:last-child{border-bottom:none;}
.rank-item:hover{background:rgba(79,142,247,0.07);padding-left:8px;}
.rank-no{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);width:22px;text-align:center;flex-shrink:0;}
.rank-no.gold{color:#FFD700;}.rank-no.silver{color:#C0C0C0;}.rank-no.bronze{color:#CD7F32;}
.rank-name{flex:1;font-size:13px;}
.rank-sub{font-size:11px;color:var(--text-muted);}
.rank-bar-wrap{width:90px;height:5px;background:var(--surface2);border-radius:3px;flex-shrink:0;}
.rank-bar{height:100%;border-radius:3px;background:var(--accent3);}
.rank-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:80px;text-align:right;flex-shrink:0;}

.data-note{padding:12px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--border);}

.empty-state{text-align:center;padding:80px 32px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-title{font-size:20px;font-weight:600;margin-bottom:8px;color:var(--text);}
.empty-sub{font-size:14px;line-height:1.7;}
.quick-picks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px;}
.quick-pick{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;cursor:pointer;transition:all 0.2s;}
.quick-pick:hover{border-color:var(--accent3);color:var(--accent3);}

@media(max-width:768px){
  header{padding:12px 16px;}
  .search-section,.result-section{padding-left:16px;padding-right:16px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .charts-grid{grid-template-columns:1fr;}
  .station-name{font-size:22px;}
}
</style>
</head>
<body>
<div class="app">
<header>
  <a class="logo" href="areascope_top.html">AREA<span>SCOPE</span></a>
  <div style="display:flex;gap:8px;">
    <a class="nav-badge" href="areascope_real.html">人口推移</a>
    <span class="nav-badge active">🚃 乗降客数</span>
  </div>
</header>

<div class="search-section">
  <div class="search-label">// 駅を検索する</div>
  <div class="search-box-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="stationSearch" placeholder="駅名を入力（例：渋谷、新宿、茅ヶ崎…）" autocomplete="off">
    <div class="autocomplete-list" id="autocompleteList"></div>
  </div>
  <div class="filter-section">
    <div class="filter-title">// または都道府県・路線から絞り込む</div>
    <div class="filter-row">
      <select id="prefSelect" onchange="onPrefChange()"><option value="">都道府県を選択</option></select>
      <select id="lineSelect" onchange="onLineChange()"><option value="">路線を選択</option></select>
      <select id="stationSelect"><option value="">駅を選択</option></select>
      <button class="search-btn" onclick="analyzeFromSelect()">分析する →</button>
    </div>
  </div>
</div>

<div class="result-section" id="resultSection">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🚃</div>
    <div class="empty-title">駅を選んで乗降客数の推移を確認</div>
    <div class="empty-sub">複数路線が乗り入れる駅は全路線合算で表示。<br>2011〜2021年の実データで、コロナ前後の変化も一目でわかります。</div>
    <div class="quick-picks" id="quickPicks"></div>
  </div>
  <div id="analysisResult" style="display:none;"></div>
</div>
</div>

<script src="station_data.js"></script>
<script src="comparison_data.js"></script>
<script>
const YEARS = [2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021];
const I19=8, I20=9, I21=10;

// 色パレット（路線内訳グラフ用）
const LINE_COLORS = ['#4f8ef7','#00d4aa','#ffa502','#ff6b9d','#a29bfe','#fd79a8','#74b9ff','#55efc4'];

const PREF_ORDER = ['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];

function shortCompany(c){
  return c.replace('東日本旅客鉄道','JR東日本').replace('東海旅客鉄道','JR東海').replace('西日本旅客鉄道','JR西日本')
   .replace('九州旅客鉄道','JR九州').replace('北海道旅客鉄道','JR北海道').replace('四国旅客鉄道','JR四国')
   .replace('小田急電鉄','小田急').replace('東京急行電鉄','東急').replace('東急電鉄','東急')
   .replace('京浜急行電鉄','京急').replace('相模鉄道','相鉄').replace('東京地下鉄','東京メトロ')
   .replace('営団地下鉄','東京メトロ');
}

// 同名駅の全路線を合算したオブジェクトを作る
function getMergedStation(name, pref) {
  const lines = STATION_DATA.filter(s => s.name === name && s.pref === pref);
  if (!lines.length) return null;
  const mergedData = YEARS.map((_,i) => lines.reduce((sum,s) => sum + (s.data[i]||0), 0));
  return { name, pref, lines, mergedData, lineCount: lines.length };
}

// 都道府県別の駅合算リスト（ランキング用）
function getPrefMergedStations(pref) {
  const nameSet = [...new Set(STATION_DATA.filter(s=>s.pref===pref).map(s=>s.name))];
  return nameSet.map(name => getMergedStation(name, pref))
    .filter(s => s && s.mergedData[I21] > 0)
    .sort((a,b) => b.mergedData[I21] - a.mergedData[I21]);
}

let mainChart = null, barChart = null;

function init() {
  buildPrefFilter();
  buildQuickPicks();
  document.getElementById('stationSearch').addEventListener('input', onSearchInput);
  document.getElementById('stationSearch').addEventListener('keydown', onSearchKeydown);
  document.addEventListener('click', e => { if (!e.target.closest('.search-box-wrap')) hideAC(); });
}

function buildPrefFilter() {
  const prefSet = new Set(STATION_DATA.map(s=>s.pref));
  const ps = document.getElementById('prefSelect');
  PREF_ORDER.forEach(p => { if(prefSet.has(p)) ps.add(new Option(p,p)); });
  [...prefSet].sort().forEach(p => { if(!PREF_ORDER.includes(p)) ps.add(new Option(p,p)); });
}

function buildQuickPicks() {
  const picks = ['渋谷','新宿','東京','大阪','名古屋','博多','横浜','茅ヶ崎','札幌','仙台'];
  const wrap = document.getElementById('quickPicks');
  picks.forEach(name => {
    // 最大乗降客数の都道府県で代表
    const stations = STATION_DATA.filter(d=>d.name===name);
    if (!stations.length) return;
    // 都道府県ごとに合算して最大のものを選ぶ
    const prefMap = {};
    stations.forEach(s => {
      if (!prefMap[s.pref]) prefMap[s.pref] = 0;
      prefMap[s.pref] += s.data[I21]||0;
    });
    const topPref = Object.entries(prefMap).sort((a,b)=>b[1]-a[1])[0][0];
    const merged = getMergedStation(name, topPref);
    const el = document.createElement('div');
    el.className = 'quick-pick';
    el.textContent = name;
    el.onclick = () => analyzeStation(merged);
    wrap.appendChild(el);
  });
}

// ===== テキスト検索 =====
let acSelected = -1, acResults = [];

function onSearchInput() {
  const q = document.getElementById('stationSearch').value.trim();
  if (!q) { hideAC(); return; }

  // ① まず「駅名が完全一致 or 前方一致」のユニーク駅名を探す
  const matchedNames = [...new Set(
    STATION_DATA.filter(s => s.name.includes(q) || s.line.includes(q) || s.pref.includes(q)).map(s=>s.name)
  )].slice(0, 8);

  acResults = [];
  const list = document.getElementById('autocompleteList');
  list.innerHTML = '';

  matchedNames.forEach(name => {
    // その駅名が存在する都道府県ごとに処理
    const prefs = [...new Set(STATION_DATA.filter(s=>s.name===name).map(s=>s.pref))];
    prefs.forEach(pref => {
      const merged = getMergedStation(name, pref);
      if (!merged) return;

      if (merged.lineCount > 1) {
        // 合算エントリ
        const totalLatest = merged.mergedData[I21];
        const item = document.createElement('div');
        item.className = 'autocomplete-item merged';
        item.innerHTML = `
          <div class="ac-left">
            <span class="ac-badge all">全${merged.lineCount}路線</span>
            <span class="ac-station">${name}</span>
            <span style="font-size:11px;color:var(--text-muted);">${pref}</span>
          </div>
          <span class="ac-meta">合計 ${totalLatest.toLocaleString()}人/日<br>${merged.lines.map(l=>l.line).join(' / ')}</span>`;
        item.addEventListener('mousedown', e => { e.preventDefault(); selectStation(merged); });
        list.appendChild(item);
        acResults.push({type:'merged', merged});

        // 路線別エントリ
        merged.lines.forEach(s => {
          const item2 = document.createElement('div');
          item2.className = 'autocomplete-item';
          item2.style.paddingLeft = '28px';
          item2.innerHTML = `
            <div class="ac-left">
              <span class="ac-badge line">路線</span>
              <span class="ac-station" style="font-size:13px;">${s.line}</span>
            </div>
            <span class="ac-meta">${shortCompany(s.company)}<br>${(s.data[I21]||0).toLocaleString()}人/日</span>`;
          item2.addEventListener('mousedown', e => { e.preventDefault(); selectSingleLine(s); });
          list.appendChild(item2);
          acResults.push({type:'single', station:s});
        });
      } else {
        // 1路線のみ
        const s = merged.lines[0];
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.innerHTML = `
          <div class="ac-left">
            <span class="ac-station">${name}</span>
            <span style="font-size:11px;color:var(--text-muted);">${pref}</span>
          </div>
          <span class="ac-meta">${s.line} / ${shortCompany(s.company)}<br>${(s.data[I21]||0).toLocaleString()}人/日</span>`;
        item.addEventListener('mousedown', e => { e.preventDefault(); selectStation(merged); });
        list.appendChild(item);
        acResults.push({type:'merged', merged});
      }
    });
  });

  if (list.children.length) list.classList.add('show');
  else list.classList.remove('show');
}

function hideAC() { document.getElementById('autocompleteList').classList.remove('show'); }

function onSearchKeydown(e) {
  const items = document.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  if (e.key==='ArrowDown'){acSelected=Math.min(acSelected+1,items.length-1);updateAcSel(items);e.preventDefault();}
  else if(e.key==='ArrowUp'){acSelected=Math.max(acSelected-1,-1);updateAcSel(items);e.preventDefault();}
  else if(e.key==='Enter'&&acSelected>=0){
    const r=acResults[acSelected];
    if(r.type==='merged') selectStation(r.merged);
    else selectSingleLine(r.station);
  }
}
function updateAcSel(items){items.forEach((el,i)=>el.classList.toggle('selected',i===acSelected));}

function selectStation(merged) {
  document.getElementById('stationSearch').value = merged.name;
  hideAC();
  analyzeStation(merged);
}
function selectSingleLine(s) {
  document.getElementById('stationSearch').value = s.name;
  hideAC();
  analyzeSingleLine(s);
}

// ===== プルダウン =====
function onPrefChange() {
  const pref = document.getElementById('prefSelect').value;
  const lineMap = new Map();
  STATION_DATA.filter(s=>s.pref===pref).forEach(s=>{
    if(!lineMap.has(s.line)) lineMap.set(s.line, new Set());
    lineMap.get(s.line).add(s.company);
  });
  const lines = [...lineMap.keys()].sort((a,b)=>a.localeCompare(b,'ja'));
  const ls = document.getElementById('lineSelect');
  ls.innerHTML = '<option value="">路線を選択</option>';
  lines.forEach(l=>{
    const companies=[...lineMap.get(l)].map(c=>shortCompany(c)).join('/');
    ls.add(new Option(`${l}（${companies}）`, l));
  });
  document.getElementById('stationSelect').innerHTML = '<option value="">駅を選択</option>';
}

function onLineChange() {
  const pref = document.getElementById('prefSelect').value;
  const line = document.getElementById('lineSelect').value;
  const seen = new Set();
  const stations = STATION_DATA.filter(s=>{
    if(s.pref!==pref||s.line!==line) return false;
    if(seen.has(s.name)) return false;
    seen.add(s.name); return true;
  });
  const ss = document.getElementById('stationSelect');
  ss.innerHTML = '<option value="">駅を選択</option>';
  stations.forEach(s=>ss.add(new Option(s.name, s.name+'__'+s.line)));
}

function analyzeFromSelect() {
  const val = document.getElementById('stationSelect').value;
  if (!val) { alert('駅を選択してください'); return; }
  const [sname, sline] = val.split('__');
  const s = STATION_DATA.find(d=>d.name===sname&&d.line===sline);
  if (!s) return;
  // プルダウンから選んだ場合は路線単体で表示
  analyzeSingleLine(s);
}

// ===== 分析：合算モード =====
function analyzeStation(merged) {
  const data = merged.mergedData;
  renderAnalysis({
    title: merged.name,
    pref: merged.pref,
    subtitle: merged.lineCount > 1
      ? `全${merged.lineCount}路線合算 | ${merged.lines.map(l=>l.line).join(' / ')}`
      : `${merged.lines[0].line} | ${shortCompany(merged.lines[0].company)}`,
    data,
    lines: merged.lines,
    isMerged: merged.lineCount > 1,
    rankName: merged.name,
    rankPref: merged.pref,
  });
}

// ===== 分析：路線単体モード =====
function analyzeSingleLine(s) {
  renderAnalysis({
    title: s.name,
    pref: s.pref,
    subtitle: `${s.line} | ${shortCompany(s.company)}`,
    data: s.data,
    lines: [s],
    isMerged: false,
    rankName: s.name,
    rankPref: s.pref,
  });
}

// ===== 共通レンダリング =====
function renderAnalysis({title, pref, subtitle, data, lines, isMerged, rankName, rankPref}) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('analysisResult').style.display = 'block';
  window.scrollTo({top: document.getElementById('resultSection').offsetTop - 70, behavior:'smooth'});

  const peak = Math.max(...data.filter(v=>v>0));
  const peakYear = YEARS[data.indexOf(peak)];
  const pre = data[I19], covid = data[I20], latest = data[I21];
  const covidDrop = pre>0 ? ((covid-pre)/pre*100).toFixed(1) : '0.0';
  const recovery  = covid>0 ? ((latest-covid)/covid*100).toFixed(1) : '0.0';
  const vsPreCovid = pre>0 ? ((latest-pre)/pre*100).toFixed(1) : '0.0';

  // ランキング：同都道府県内の合算ベース
  const prefRanked = getPrefMergedStations(pref);
  const myRank = prefRanked.findIndex(s=>s.name===rankName) + 1;

  // 路線内訳HTML
  const breakdownHtml = isMerged ? buildBreakdown(lines, latest) : '';

  document.getElementById('analysisResult').innerHTML = `
    <div class="station-titlebar">
      <div>
        <div class="station-name"><span class="pref-tag">${pref}</span>${title}</div>
        <div class="station-meta">${subtitle} &nbsp;|&nbsp; ${pref}内: ${myRank>0?myRank+'位':'-'} / ${prefRanked.length}駅中（合算ベース）</div>
        ${isMerged ? `<div class="line-tags">${lines.map((s,i)=>`<span class="line-tag" onclick="selectSingleLine(STATION_DATA.find(d=>d.name==='${s.name.replace(/'/g,"\\'")}' && d.line==='${s.line.replace(/'/g,"\\'")}'))">${s.line}</span>`).join('')}</div>` : ''}
      </div>
      <div style="text-align:right;">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);">${isMerged?'全路線合算':'路線単体'} / 最新</div>
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent3);">2021</div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card k-latest">
        <div class="kpi-label">最新乗降客数（2021年）</div>
        <div class="kpi-value">${latest.toLocaleString()}</div>
        <div class="kpi-sub">人/日${isMerged?'（全路線合算）':''}</div>
        <span class="kpi-badge ${parseFloat(vsPreCovid)>=0?'up':'down'}">${parseFloat(vsPreCovid)>=0?'▲':'▼'}${Math.abs(vsPreCovid)}% vs 2019</span>
      </div>
      <div class="kpi-card k-peak">
        <div class="kpi-label">ピーク（${peakYear}年）</div>
        <div class="kpi-value">${peak.toLocaleString()}</div>
        <div class="kpi-sub">人/日</div>
        <span class="kpi-badge neutral">${peakYear}年が最大</span>
      </div>
      <div class="kpi-card k-covid">
        <div class="kpi-label">コロナ影響（2020年）</div>
        <div class="kpi-value">${covid.toLocaleString()}</div>
        <div class="kpi-sub">人/日</div>
        <span class="kpi-badge down">▼${Math.abs(covidDrop)}%（2019年比）</span>
      </div>
      ${buildComparisonKPI(data, pref)}
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">
          乗降客数推移（2011〜2021年）
          <small>出典: 国土数値情報 S12-22</small>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);cursor:pointer;">
            <input type="checkbox" id="showNational" checked onchange="showNationalLine=this.checked;toggleComparison()"> 全国平均
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);cursor:pointer;">
            <input type="checkbox" id="showPref" checked onchange="showPrefLine=this.checked;toggleComparison()"> ${pref}平均
          </label>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);">※ 2011年=100の指数で比較</span>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">年別比較（2019・2020・2021）</div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    ${breakdownHtml}

    <div class="covid-bar">
      <div class="ranking-title" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent3);letter-spacing:1px;margin-bottom:12px;">// コロナ前後の変化</div>
      ${buildImpactBars(data)}
    </div>

    <div class="ranking-card">
      <div class="ranking-title">// ${pref}内 乗降客数ランキング（2021年・全路線合算）</div>
      ${buildRanking(prefRanked, rankName)}
    </div>

    <div class="data-note">
      <span>📊 出典: 国土交通省 国土数値情報 駅別乗降客数データ（S12-22）</span>
      <span>⚠ 一部事業者非公開・0人の駅を除く</span>
    </div>
  `;

  requestAnimationFrame(()=>requestAnimationFrame(()=>drawCharts(data, lines, isMerged, pre, covid, latest, pref)));
}

function buildBreakdown(lines, totalLatest) {
  const sorted = lines.slice().sort((a,b)=>(b.data[I21]||0)-(a.data[I21]||0));
  const maxVal = sorted[0].data[I21]||1;
  const colors = LINE_COLORS;
  return `<div class="lines-breakdown">
    <div class="breakdown-title">// 路線別内訳（2021年）― クリックで路線単体を表示</div>
    ${sorted.map((s,i)=>{
      const val = s.data[I21]||0;
      const pct = totalLatest>0 ? (val/totalLatest*100).toFixed(0) : 0;
      return `<div class="breakdown-row" onclick="selectSingleLine(STATION_DATA.find(d=>d.name==='${s.name.replace(/'/g,"\\'")}' && d.line==='${s.line.replace(/'/g,"\\'")}'))">
        <div class="br-line">
          <div class="br-line-name">${s.line}</div>
          <div class="br-company">${shortCompany(s.company)}</div>
        </div>
        <div class="br-bar-wrap"><div class="br-bar" style="width:${(val/maxVal*100).toFixed(1)}%;background:${colors[i%colors.length]};"></div></div>
        <div class="br-val" style="color:${colors[i%colors.length]};">${val.toLocaleString()}</div>
        <div class="br-pct">${pct}%</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildImpactBars(data) {
  const max = Math.max(...data.filter(v=>v>0));
  return [
    {label:'2019年', val:data[I19], color:'var(--accent)'},
    {label:'2020年', val:data[I20], color:'var(--negative)'},
    {label:'2021年', val:data[I21], color:'var(--accent3)'},
  ].map(r=>`<div class="impact-row">
    <div class="impact-label">${r.label}</div>
    <div class="impact-bar-wrap"><div class="impact-bar" style="width:${(r.val/max*100).toFixed(1)}%;background:${r.color};"></div></div>
    <div class="impact-val" style="color:${r.color};">${r.val.toLocaleString()} 人</div>
  </div>`).join('');
}

function buildRanking(stations, currentName) {
  const top = stations.slice(0,10);
  const maxVal = top[0].mergedData[I21];
  return top.map((s,i)=>{
    const isCurrent = s.name===currentName;
    const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const val = s.mergedData[I21];
    return `<div class="rank-item" onclick="analyzeStation(getMergedStation('${s.name.replace(/'/g,"\\'")}','${s.pref.replace(/'/g,"\\'")}'))">
      <div class="rank-no ${rc}">${i+1}</div>
      <div style="flex:1;">
        <div class="rank-name" style="${isCurrent?'color:var(--accent3);font-weight:600;':''}">${s.name}${isCurrent?' ← 現在':''}</div>
        <div class="rank-sub">${s.lineCount}路線</div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(val/maxVal*100).toFixed(1)}%;"></div></div>
      <div class="rank-val">${val.toLocaleString()}</div>
    </div>`;
  }).join('');
}


// ===== 比較KPIカード =====
function buildComparisonKPI(data, pref) {
  if (!window.RECOVERY_PERCENTILES || !window.NATIONAL_INDEX) {
    const recovery = data[9]>0 ? ((data[10]-data[9])/data[9]*100).toFixed(1) : '0.0';
    return `<div class="kpi-card k-rec">
      <div class="kpi-label">回復率（2020→2021）</div>
      <div class="kpi-value">${parseFloat(recovery)>=0?'+':''}${recovery}%</div>
      <div class="kpi-sub">2020年比</div>
      <span class="kpi-badge ${parseFloat(recovery)>=0?'up':'down'}">${parseFloat(recovery)>=0?'回復傾向':'未回復'}</span>
    </div>`;
  }
  const recoveryRate = data[8]>0 ? data[10]/data[8]*100 : 0;
  const p = RECOVERY_PERCENTILES;
  const national2021 = NATIONAL_INDEX[10];
  const prefIndex = PREF_INDEXES[pref];
  const pref2021 = prefIndex ? prefIndex[10] : national2021;
  const stationIdx = data[0]>0 ? data[10]/data[0]*100 : 0;
  let rank, rankColor, rankLabel;
  if (recoveryRate >= p.p90) { rank='S'; rankColor='#00d4aa'; rankLabel='超優秀'; }
  else if (recoveryRate >= p.p75) { rank='A'; rankColor='#4f8ef7'; rankLabel='優秀'; }
  else if (recoveryRate >= p.p50) { rank='B'; rankColor='#ffa502'; rankLabel='平均以上'; }
  else if (recoveryRate >= p.p25) { rank='C'; rankColor='#ff6b35'; rankLabel='平均以下'; }
  else { rank='D'; rankColor='#ff4757'; rankLabel='要注意'; }
  const vsNational = (stationIdx - national2021).toFixed(1);
  const vsPref = (stationIdx - pref2021).toFixed(1);
  return `<div class="kpi-card k-rec" style="position:relative;">
    <div class="kpi-label">エリア比較スコア（2011→2021）</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:${rankColor};line-height:1;">${rank}</div>
      <div>
        <div style="font-size:12px;color:var(--text-muted);">回復力 <span style="color:${rankColor};font-weight:600;">${rankLabel}</span></div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;margin-top:4px;">全国比 <span style="color:${parseFloat(vsNational)>=0?'var(--accent)':'var(--negative)'}">${parseFloat(vsNational)>=0?'+':''}${vsNational}pt</span></div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;">${pref}比 <span style="color:${parseFloat(vsPref)>=0?'var(--accent)':'var(--negative)'}">${parseFloat(vsPref)>=0?'+':''}${vsPref}pt</span></div>
      </div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:6px;">この駅の指数: ${stationIdx.toFixed(1)} / 全国平均: ${national2021}</div>
  </div>`;
}

let currentDrawData = null;
let showNationalLine = true;
let showPrefLine = true;
function toggleComparison() {
  if (currentDrawData) {
    const {data,lines,isMerged,pre,covid,latest,pref} = currentDrawData;
    drawCharts(data,lines,isMerged,pre,covid,latest,pref);
  }
}

function drawCharts(data, lines, isMerged, pre, covid, latest, pref) {
  currentDrawData = {data,lines,isMerged,pre,covid,latest,pref};
  if (mainChart) mainChart.destroy();
  if (barChart) barChart.destroy();
  Chart.defaults.color='#6b7a99';
  Chart.defaults.font.family="'DM Mono',monospace";
  Chart.defaults.font.size=11;

  const ctx1 = document.getElementById('mainChart').getContext('2d');
  const showNational = showNationalLine;
  const showPref = showPrefLine;

  const base = data[0]>0 ? data[0] : 1;
  const stationIndexData = data.map(v => v>0 ? +(v/base*100).toFixed(1) : null);

  let datasets = [{
    label: isMerged && lines.length>1 ? '合算（指数）' : (lines[0]?.line||'乗降客数'),
    data: stationIndexData,
    borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,0.15)',
    fill:true, tension:0.35, pointRadius:4,
    pointBackgroundColor:stationIndexData.map((_,i)=>i===I20?'#ff4757':'#4f8ef7'),
    pointBorderColor:'#0a0e1a', pointBorderWidth:2, borderWidth:2.5
  }];

  if (showNational && window.NATIONAL_INDEX) {
    datasets.push({label:'全国平均', data:NATIONAL_INDEX,
      borderColor:'#ffa502', backgroundColor:'transparent',
      fill:false, tension:0.35, pointRadius:2, borderWidth:1.5, borderDash:[5,3]});
  }
  if (showPref && window.PREF_INDEXES && pref && PREF_INDEXES[pref]) {
    datasets.push({label:`${pref}平均`, data:PREF_INDEXES[pref],
      borderColor:'#00d4aa', backgroundColor:'transparent',
      fill:false, tension:0.35, pointRadius:2, borderWidth:1.5, borderDash:[3,2]});
  }

  const covidPlugin={id:'covidZone',beforeDraw(chart){
    const{ctx,chartArea,scales}=chart;if(!chartArea)return;
    const x1=scales.x.getPixelForValue('2020'),x2=scales.x.getPixelForValue('2021');
    ctx.save();ctx.fillStyle='rgba(255,71,87,0.07)';
    ctx.fillRect(x1,chartArea.top,x2-x1,chartArea.bottom-chartArea.top);ctx.restore();
  }};
  const baselinePlugin={id:'baseline',beforeDraw(chart){
    const{ctx,chartArea,scales}=chart;if(!chartArea)return;
    const y100=scales.y.getPixelForValue(100);
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(chartArea.left,y100);ctx.lineTo(chartArea.right,y100);ctx.stroke();ctx.restore();
  }};

  mainChart = new Chart(ctx1,{
    type:'line', plugins:[covidPlugin,baselinePlugin],
    data:{labels:YEARS.map(String), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, labels:{color:'#6b7a99',boxWidth:20,font:{size:10}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw}pt`}}
      },
      scales:{
        x:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99'}},
        y:{grid:{color:'rgba(30,45,69,0.8)'},
          ticks:{color:'#6b7a99',callback:v=>v+'pt'},
          title:{display:true,text:'2011年=100',color:'#6b7a99',font:{size:10}}}
      }
    }
  });

  const ctx2=document.getElementById('barChart').getContext('2d');
  barChart=new Chart(ctx2,{
    type:'bar',
    data:{labels:['2019年','2020年','2021年'],
      datasets:[{data:[pre,covid,latest],
        backgroundColor:['rgba(0,212,170,0.7)','rgba(255,71,87,0.7)','rgba(79,142,247,0.7)'],
        borderColor:['#00d4aa','#ff4757','#4f8ef7'],borderWidth:2,borderRadius:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw.toLocaleString()}人/日`}}},
      scales:{
        x:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99'}},
        y:{grid:{color:'rgba(30,45,69,0.8)'},ticks:{color:'#6b7a99',callback:v=>v>=10000?(v/10000).toFixed(0)+'万':v.toLocaleString()}}
      }
    }
  });
}

init();
</script>
</body>
</html>
